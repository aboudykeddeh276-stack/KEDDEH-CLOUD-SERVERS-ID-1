name: GlobalContinuousRepositoryStateIntegrityAndStateSeedTransferVerificationPipeline

on:
  push:
    branches:
      - main
      - development
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  execute_exhaustive_uncompressed_state_verification:
    runs-on: ubuntu-latest
    steps:
      - name: CheckoutTargetRepositorySourceCodeWithoutCompression
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: InitializePythonExecutionEnvironmentRuntime
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: RunGlobalMasterRepositoryAutomatedSystemIntegrityAndStateSeedTransferEngineMasterController
        run: |
          python3 -c "
          import pathlib
          import os
          from repository_automation import GlobalMasterRepositoryAutomatedSystemIntegrityAndStateSeedTransferEngineMasterController

          repo_root = str(pathlib.Path('.').resolve())
          readme_path = os.path.join(repo_root, 'README.md')

          orchestration_engine_instance = GlobalMasterRepositoryAutomatedSystemIntegrityAndStateSeedTransferEngineMasterController(
              target_repository_root_directory_absolute_path_string=repo_root,
              keddeh_matrix_reference_configuration_blueprint_dictionary={
                  readme_path: {'hash': 'REFERENCE_STATE_HASH_VALUE_LITERAL_ONE'}
              }
          )
          execution_telemetry_result_dictionary = orchestration_engine_instance.execute_complete_repository_state_integrity_verification_and_self_healing_lifecycle()
          print(execution_telemetry_result_dictionary)
          import sys
          sys.exit(0 if execution_telemetry_result_dictionary.get('execution_status_boolean') == True else 1)
          "
